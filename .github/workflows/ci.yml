name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Pipeline smoke
        run: python -m exoplanets_research.pipeline --stage score --input data/PS_2025.06.22_09.41.26.csv
      - name: Conservative language check
        run: |
          ! grep -R -n -E "life[ ]found|alien[ ]life|proof[ ]of[ ]life|confirmed[ ]life|biosignature[ ]detected" README.md docs paper frontend/src src tests
      - name: Frontend install
        run: npm --prefix frontend ci
      - name: Frontend build
        run: npm --prefix frontend run build
